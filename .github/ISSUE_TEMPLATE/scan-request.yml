name: Scan Request
description: Request a security scan of an AI agent skill repository
title: "[Scan Request] "
labels: ["scan-request"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for submitting a scan request! Please provide the GitHub repository URL below.
        An authorized maintainer will review and approve the scan.

  - type: input
    id: repo_url
    attributes:
      label: Repository URL
      description: "GitHub URL of the skill repository to scan"
      placeholder: "https://github.com/owner/repo"
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason / Description
      description: "Why should this repo be scanned? Any context about the skill."
      placeholder: "This skill has 500+ installs and handles sensitive data..."
    validations:
      required: false

  - type: checkboxes
    id: acknowledgement
    attributes:
      label: Acknowledgement
      options:
        - label: "I confirm this is a public GitHub repository containing AI agent skills (SKILL.md files)"
          required: true
